<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Image Rotation Effect</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="banner">
        <div class="slider" style="--quantity: 6">
            <div class="item" style="--position: 1"><img src="01.jpg" alt=""></div>
            <div class="item" style="--position: 2"><img src="01.1.jpg" alt=""></div>
            <div class="item" style="--position: 3"><img src="01.2_1.jpg" alt=""></div>
            <div class="item" style="--position: 4"><img src="01.2_2.jpg" alt=""></div>
            <div class="item" style="--position: 5"><img src="01.4.jpg" alt=""></div>
            <div class="item" style="--position: 6"><img src="01.5.jpg" alt=""></div>

            <div class="center-photo">
                <div class="photo-wrapper">
                    <img src="FOTO.png" alt="Sua Foto" id="userPhoto">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
