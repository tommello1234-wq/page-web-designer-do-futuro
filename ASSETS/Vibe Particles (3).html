<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Particles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0a0a0a; overflow: hidden; width: 100vw; height: 100vh; }
        .background-glow { position: fixed; inset: 0; width: 100%; height: 100%; z-index: -10; background: radial-gradient(ellipse at top, rgba(255, 102, 0, 0.15) 0%, rgba(97, 0, 183, 0.05) 50%, rgba(10, 10, 10, 1) 100%); pointer-events: none; mix-blend-mode: overlay; }
        .grid-overlay { position: absolute; inset: 0; z-index: 10; width: 100%; height: 100%; pointer-events: none; opacity: 0.2; background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 40px 40px; border-top: 1px solid rgba(255, 255, 255, 0.1); }
        #tsparticles { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20; }
    </style>
</head>
<body>
    <div class="background-glow"></div>
    <div class="grid-overlay"></div>
    <div id="tsparticles"></div>
    <script>
        document.addEventListener("DOMContentLoaded",async()=>{await tsParticles.load("tsparticles",{fullScreen:{enable:false},background:{color:{value:"transparent"}},fpsLimit:120,interactivity:{events:{onClick:{enable:true,mode:"push"},onHover:{enable:true,mode:"grab",parallax:{enable:true,force:60,smooth:10}},resize:true},modes:{push:{quantity:4},grab:{distance:200,links:{opacity:0.5,color:"#FF6600"}}}},particles:{color:{value:["#FF6600","#6100B7","#CB3395"]},links:{color:"#6100B7",distance:150,enable:true,opacity:0.2,width:1},collisions:{enable:false},move:{direction:"none",enable:true,outModes:{default:"bounce"},random:true,speed:0.8,straight:false},number:{density:{enable:true,area:800},value:60},opacity:{value:{min:0.1,max:0.5},animation:{enable:true,speed:1,minimumValue:0.1}},shape:{type:"circle"},size:{value:{min:1,max:3}}},detectRetina:true})});
    </script>
</body>
</html>
